name: ci
on:
  push:
    branches: ['**']
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: API install
        working-directory: annaban-ecosystem/backend/api
        run: npm ci || npm install
      - name: Dashboard install
        working-directory: annaban-ecosystem/frontend/dashboard
        run: npm ci || npm install
      - name: Dashboard build
        working-directory: annaban-ecosystem/frontend/dashboard
        run: npm run build
      - name: Python syntax checks
        run: |
          python -m py_compile annaban-ecosystem/backend/ai/main.py
          python -m py_compile annaban-ecosystem/backend/aether/main.py
          python -m py_compile annaban-ecosystem/backend/oracle/main.py
