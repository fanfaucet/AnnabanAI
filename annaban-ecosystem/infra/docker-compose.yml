version: '3.9'
services:
  api:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../backend/api:/app
    command: sh -c "npm install && npm run dev"
    env_file:
      - ../backend/api/.env.example
    ports:
      - "4000:4000"
    depends_on: [ai, aether, oracle]

  ai:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend/ai:/app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8001"
    ports: ["8001:8001"]

  aether:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend/aether:/app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8002"
    ports: ["8002:8002"]

  oracle:
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - ../backend/oracle:/app
    command: sh -c "pip install -r requirements.txt && uvicorn main:app --host 0.0.0.0 --port 8003"
    ports: ["8003:8003"]

  dashboard:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ../frontend/dashboard:/app
    command: sh -c "npm install && npm run dev"
    environment:
      - VITE_API_BASE=http://localhost:4000
    ports:
      - "5173:5173"
    depends_on: [api]
